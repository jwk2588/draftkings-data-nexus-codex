version: "3.9"

# ============================================================
# DraftKings Data Nexus Codex — Neo4j 5 Graph Core
# ============================================================
# Stand up: docker compose -f docker/docker-compose.yml up -d
# Browser:  http://localhost:7474  (neo4j / dknexus2026)
# Bolt:     bolt://localhost:7687
# ============================================================

services:

  neo4j:
    image: neo4j:5
    container_name: dk_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/dknexus2026"
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2G"
      NEO4J_dbms_memory_pagecache_size: "512m"
      # Enable Cypher constraint enforcement
      NEO4J_dbms_cypher_forbid__exhaustive__shortestpath: "false"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - ./neo4j_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: dk_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  qdrant_data:
