# Detonator Board
# ----------------------------------------------------------

detonator_board:
  symbolic_name: "Detonator Board"
  enterprise_name: "High-Impact Decision Trigger Matrix"
  tier: "T1"
  description: >
    The Detonator Board is the convergence logic that maps all 25 Pillars,
    27 Levees, and Six-Engine outputs to maximum legal exposure triggers.
    When sufficient Levees are breached simultaneously, the Detonator Board
    activates, signaling the highest-confidence litigation posture.
  activation_conditions:
    - "Minimum 3 T1 Pillars with confirmed evidence"
    - "Minimum 2 Levee breaches in the same domain"
    - "At least one Engine-06 convergence event"
  output: "Detonator Board Activation Report (DBAR)"
